server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://morupark.urssu.com"
              - "https://frontend-morupark.pages.dev"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: queue-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/queues/**
          filters:
            - JwtAuthenticationFilter
        - id: auth-service-docs
          uri: http://localhost:8081
          predicates:
            - Path=/auth-service/v3/api-docs
        - id: queue-service-docs
          uri: http://localhost:8082
          predicates:
            - Path=/queue-service/v3/api-docs

security:
  jwt:
    secret: ${JWT_SECRET:thisIsASecretKeyForJWTGenerationChangeMe}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: queue-service
        url: /queue-service/v3/api-docs

logging:
  level:
    com.yourssu.morupark: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**
        - id: queue-service
          uri: ${QUEUE_SERVICE_URL}
          predicates:
            - Path=/api/queues/**
          filters:
            - JwtAuthenticationFilter
        - id: auth-service-docs
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/auth-service/v3/api-docs
        - id: queue-service-docs
          uri: ${QUEUE_SERVICE_URL}
          predicates:
            - Path=/queue-service/v3/api-docs

security:
  jwt:
    secret: ${JWT_SECRET}
logging:
  level:
    com.yourssu.morupark: INFO
