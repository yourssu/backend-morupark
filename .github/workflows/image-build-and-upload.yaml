name: Build and Push to GCP Artifact Registry

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: yourssu-morupark
  GCP_REGION: asia-northeast3
  AR_REGISTRY: asia-northeast3-docker.pkg.dev
  AR_REPOSITORY: morupark-repo-private

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            services-auth:
              - 'services-auth/**'
              - 'services-common/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
            services-queue:
              - 'services-queue/**'
              - 'services-common/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
            services-goods:
              - 'services-goods/**'
              - 'services-common/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
            services-api-gateway:
              - 'services-api-gateway/**'
              - 'services-common/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'

      - name: Generate version tag from Git SHA
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short=8 HEAD)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set matrix for changed modules
        id: set-matrix
        run: |
          modules=()
          if [[ "${{ steps.filter.outputs.services-auth }}" == "true" ]]; then modules+=("services-auth"); fi
          if [[ "${{ steps.filter.outputs.services-queue }}" == "true" ]]; then modules+=("services-queue"); fi
          if [[ "${{ steps.filter.outputs.services-goods }}" == "true" ]]; then modules+=("services-goods"); fi
          if [[ "${{ steps.filter.outputs.services-api-gateway }}" == "true" ]]; then modules+=("services-api-gateway"); fi
          
          if [ ${#modules[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            matrix_json=$(printf '%s\n' "${modules[@]}" | jq -R . | jq -s -c '{include: map({module: .})}')
            echo "matrix=${matrix_json}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'gradle'

      - name: GCP Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.AR_REGISTRY }} --quiet

      - name: Build with Gradle (Test included)
        run: ./gradlew :${{ matrix.module }}:build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker meta
        id: meta
        run: |
          # services-auth -> auth-service 형태의 이미지 이름을 맞추기 위함 (기존 컨벤션 준수)
          IMAGE_NAME=$(echo "${{ matrix.module }}" | sed 's/services-//')-service
          # api-gateway-service는 예외적으로 api-gateway로 맞출 수도 있으나, 여기서는 일괄 -service 적용 후 조정
          if [[ "${IMAGE_NAME}" == "api-gateway-service" ]]; then IMAGE_NAME="api-gateway"; fi
          
          TAG_SHA="${{ env.AR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${IMAGE_NAME}:sha-${{ needs.detect-changes.outputs.version }}"
          TAG_LATEST="${{ env.AR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${IMAGE_NAME}:latest"
          
          echo "tags=${TAG_SHA},${TAG_LATEST}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.module }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}

  summary:
    needs: [detect-changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate build summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.detect-changes.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
