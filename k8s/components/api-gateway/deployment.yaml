apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: morupark-prod
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: morupark-msa
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      serviceAccountName: api-gateway-sa-prod
      containers:
        - name: api-gateway
          image: asia-northeast3-docker.pkg.dev/yourssu-morupark/morupark-repo-private/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.morupark-prod.svc.cluster.local:8081"
            - name: QUEUE_SERVICE_URL
              value: "http://queue-service.morupark-prod.svc.cluster.local:8082"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: morupark-gcp-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
