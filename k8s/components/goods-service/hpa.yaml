apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: goods-service-hpa
  namespace: morupark-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: goods-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
