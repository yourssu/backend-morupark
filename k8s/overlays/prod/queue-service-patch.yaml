apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-service
  namespace: morupark-prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-service
      app.kubernetes.io/component: queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue-service
        app.kubernetes.io/component: queue
        app.kubernetes.io/part-of: morupark-msa
    spec:
      containers:
      - name: queue-service
        image: asia-northeast3-docker.pkg.dev/yourssu-morupark/morupark-repo-private/queue-service:latest
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
          - name: KAFKA_BOOTSTRAP_SERVERS
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: KAFKA_BOOTSTRAP_SERVERS
          - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: SPRING_JPA_HIBERNATE_DDL_AUTO
          - name: REDIS_HOST
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: REDIS_HOST
          - name: REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: REDIS_PORT