apiVersion: apps/v1
kind: Deployment
metadata:
  name: goods-service
  namespace: morupark-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: goods-service
      app.kubernetes.io/component: goods
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goods-service
        app.kubernetes.io/component: goods
        app.kubernetes.io/part-of: morupark-msa
    spec:
      containers:
      - name: goods-service
        image: asia-northeast3-docker.pkg.dev/yourssu-morupark/morupark-repo-private/goods-service:latest
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
          - name: KAFKA_BOOTSTRAP_SERVERS
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: KAFKA_BOOTSTRAP_SERVERS
          - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
            valueFrom:
              configMapKeyRef:
                name: morupark-config
                key: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
          - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
            value: "true"
          - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
            value: "health,info,metrics"
